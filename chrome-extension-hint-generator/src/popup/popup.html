<!-- popup.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
    <title>CodeMate Hint Generator</title>
</head>
<body>
    <div id="app">
        <header>
            <h1>CodeMate</h1>
            <p class="subtitle">Your Competitive Programming Assistant</p>
        </header>
        <main>
            <div id="hint-container">
                <div id="problem-info" class="hidden">
                    <h2 id="problem-title">Problem Title</h2>
                    <p id="problem-difficulty">Difficulty: <span></span></p>
                </div>
                <div id="hint-display">
                    <p class="message">Open a Codeforces problem to get hints!</p>
                </div>
                <button id="generate-hint" class="btn">Get Hint</button>
            </div>
            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>Analyzing problem...</p>
            </div>
        </main>
        <footer>
            <p>Made with ❤️ by CodeMate Team</p>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
